<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUDHOLE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    /* Canvas стеки */
    #canvas-bg, #canvas-terrain, #canvas-game, #canvas-effects, #canvas-ui-game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #canvas-bg      { z-index: 1; }
    #canvas-terrain { z-index: 2; }
    #canvas-game    { z-index: 3; }
    #canvas-effects { z-index: 4; }
    #canvas-ui-game { z-index: 5; }

    /* UI overlay поверх всех canvas */
    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
    }

    /* ── Общие компоненты ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .panel {
      background: rgba(10, 10, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 32px 40px;
      min-width: 360px;
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #ff6b35, #f7c59f, #ff6b35);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoPulse 3s ease-in-out infinite;
      text-shadow: none;
      margin-bottom: 8px;
    }

    .logo-sub {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    @keyframes logoPulse {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    input:focus { border-color: rgba(255,107,53,0.6); }
    input::placeholder { color: rgba(255,255,255,0.25); }

    label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #e04e1f);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255,107,53,0.3);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(255,107,53,0.45); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.13); color: #fff; }

    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      padding: 8px;
    }
    .btn-ghost:hover { color: rgba(255,255,255,0.75); }

    .btn-danger {
      background: rgba(255, 60, 60, 0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,60,60,0.25);
    }

    .form-group { margin-bottom: 16px; }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #fff;
    }

    /* ── Lobby ── */
    .lobby-root {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: rgba(4, 6, 14, 0.88);
      backdrop-filter: blur(10px);
    }

    .lobby-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(0,0,0,0.45);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .lobby-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff6b35, #f7c59f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lobby-room-name {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    .lobby-header-spacer { flex: 1; }

    .lobby-share {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lobby-share-label {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .share-url {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .btn-copy {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: rgba(255,255,255,0.14); color: #fff; }

    .lobby-btn-leave {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,60,60,0.25);
      background: rgba(255,60,60,0.1);
      color: rgba(255,120,120,0.75);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .lobby-btn-leave:hover { background: rgba(255,60,60,0.22); color: #ff8888; }

    .lobby-body {
      display: flex;
      gap: 14px;
      flex: 1;
      padding: 16px 20px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Team panels ── */
    .lobby-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .lobby-team-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .lobby-team.team-a .lobby-team-header {
      background: linear-gradient(135deg, rgba(74,158,255,0.18) 0%, rgba(74,158,255,0.06) 100%);
    }
    .lobby-team.team-b .lobby-team-header {
      background: linear-gradient(135deg, rgba(255,74,74,0.18) 0%, rgba(255,74,74,0.06) 100%);
    }
    .lobby-team.team-a { background: rgba(8,14,30,0.9); }
    .lobby-team.team-b { background: rgba(18,8,10,0.9); }

    .lobby-team-badge {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .lobby-team.team-a .lobby-team-badge { background: rgba(74,158,255,0.2); }
    .lobby-team.team-b .lobby-team-badge { background: rgba(255,74,74,0.2); }

    .lobby-team-info { flex: 1; }

    .lobby-team-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .lobby-team.team-a .lobby-team-name { color: #6ab8ff; }
    .lobby-team.team-b .lobby-team-name { color: #ff7070; }

    .lobby-team-count {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .lobby-team-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .lobby-team.team-a .lobby-team-indicator { background: #4a9eff; box-shadow: 0 0 8px #4a9eff; }
    .lobby-team.team-b .lobby-team-indicator { background: #ff4a4a; box-shadow: 0 0 8px #ff4a4a; }

    .lobby-player-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .lobby-player-list::-webkit-scrollbar { width: 4px; }
    .lobby-player-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .lobby-player-card {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s;
      position: relative;
    }
    .lobby-player-card.is-me {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }
    .lobby-team.team-a .lobby-player-card.is-me { border-left: 2px solid rgba(74,158,255,0.6); }
    .lobby-team.team-b .lobby-player-card.is-me { border-left: 2px solid rgba(255,74,74,0.6); }

    .lobby-player-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .lobby-team.team-a .lobby-player-avatar { background: rgba(74,158,255,0.15); }
    .lobby-team.team-b .lobby-player-avatar { background: rgba(255,74,74,0.15); }

    .lobby-player-details { flex: 1; min-width: 0; }

    .lobby-player-name {
      font-size: 14px;
      font-weight: 600;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lobby-player-card.is-me .lobby-player-name { color: #fff; }

    .lobby-player-role {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 1px;
      letter-spacing: 0.3px;
    }

    .lobby-host-badge {
      font-size: 11px;
      background: rgba(255,200,0,0.15);
      border: 1px solid rgba(255,200,0,0.25);
      color: #ffc800;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .btn-swap {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-swap:hover { background: rgba(255,255,255,0.13); color: #fff; border-color: rgba(255,255,255,0.25); }

    .lobby-empty-slot {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.2);
      font-size: 13px;
    }
    .lobby-empty-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0.4;
    }

    /* ── Sidebar ── */
    .lobby-sidebar {
      width: 256px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .lobby-box {
      background: rgba(8,12,24,0.9);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .lobby-box-header {
      padding: 12px 16px 0;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
    }

    .lobby-map-canvas-wrap {
      padding: 10px 12px 12px;
      position: relative;
    }

    .map-preview {
      width: 100%;
      height: 110px;
      border-radius: 8px;
      display: block;
    }

    .lobby-map-name-overlay {
      position: absolute;
      bottom: 18px;
      left: 18px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
      letter-spacing: 0.5px;
    }

    .lobby-balance-note {
      padding: 10px 14px;
      font-size: 12px;
      color: rgba(255,200,80,0.8);
      background: rgba(255,160,0,0.08);
      border-top: 1px solid rgba(255,160,0,0.12);
      display: none;
    }
    .lobby-balance-note.visible { display: block; }

    .lobby-players-summary {
      padding: 10px 16px 12px;
      display: flex;
      gap: 10px;
    }

    .lobby-team-summary {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }
    .lobby-team-summary.a { border-top: 2px solid rgba(74,158,255,0.5); }
    .lobby-team-summary.b { border-top: 2px solid rgba(255,74,74,0.5); }

    .lobby-team-summary-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .lobby-team-summary.a .lobby-team-summary-label { color: #4a9eff; }
    .lobby-team-summary.b .lobby-team-summary-label { color: #ff4a4a; }

    .lobby-team-summary-count {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
    }

    #btn-start {
      margin-top: auto;
      padding: 16px;
      font-size: 15px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ff6b35, #e04e1f);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 22px rgba(255,107,53,0.32);
      font-family: inherit;
      flex-shrink: 0;
    }
    #btn-start:hover { box-shadow: 0 6px 28px rgba(255,107,53,0.52); transform: translateY(-1px); }
    #btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .balance-note { display: none; }

    /* ── Загрузка ── */
    .loading-bar-wrap {
      width: 300px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, #f7c59f);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 12px;
    }

    /* ── Игровой HUD ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
    }

    .hud-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }

    .hud-team {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 200px;
    }
    .hud-team.right { align-items: flex-end; }

    .hud-player-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .hud-team.right .hud-player-row { flex-direction: row-reverse; }

    .hud-hp-bar {
      width: 80px; height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .hud-hp-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .hud-center {
      text-align: center;
      flex: 1;
    }

    .hud-turn-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-turn-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .hud-timer {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      transition: color 0.3s;
    }
    .hud-timer.urgent  { color: #ff4a4a; animation: timerPulse 0.5s infinite; }
    .hud-timer.retreat { color: #ff9900; animation: timerPulse 0.8s infinite; }

    .hud-wind {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #cce4ff;
      line-height: 1;
    }
    .hud-wind-calm  { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1.5px; }
    .hud-wind-arrow { font-size: 15px; }
    .hud-wind-bars  { letter-spacing: 2px; }

    .hud-next {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.4);
      min-height: 14px;
    }

    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    #hud-weapons {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: auto;
    }

    .hud-weapon-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }

    .weapon-slots-row {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 8px 10px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .weapon-slot {
      width: 54px; height: 60px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .weapon-slot:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.09);
      transform: translateY(-2px);
    }
    .weapon-slot.active {
      border-color: #ff6b35;
      background: rgba(255,107,53,0.18);
      box-shadow: 0 0 14px rgba(255,107,53,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
      transform: translateY(-3px);
    }

    .weapon-icon-canvas { display: block; }

    .weapon-slot-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 3px;
    }

    .weapon-key-badge {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
    }

    .ammo-badge {
      font-size: 10px;
      font-weight: 800;
      color: #88ff88;
      text-shadow: 0 0 6px currentColor;
    }

    .hud-team-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hud-team-title-a { color: #4a9eff; }
    .hud-team-title-b { color: #ff4a4a; }
    .hud-score {
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 1px 7px;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
    }

    .hud-player-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 3px 4px;
      border-radius: 6px;
      opacity: 0.65;
      transition: opacity 0.2s, background 0.2s;
    }
    .hud-player-row.active {
      opacity: 1;
      background: rgba(255,255,255,0.07);
    }
    .hud-team.right .hud-player-row { flex-direction: row-reverse; }

    .hud-worm-icon { font-size: 13px; }
    .hud-worm-name { font-size: 12px; flex: 1; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hud-hp-num    { font-size: 11px; min-width: 26px; text-align: right; color: rgba(255,255,255,0.7); }

    #hud-controls-hint {
      position: fixed;
      bottom: 20px;
      left: 16px;
      transform: none;
      background: rgba(0,0,0,0.52);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 10px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.4px;
      white-space: nowrap;
      pointer-events: none;
    }

    #hud-leave {
      position: absolute; top: 10px; right: 12px;
      background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.28);
      color: rgba(255,255,255,0.5); border-radius: 6px;
      padding: 4px 10px; font-size: 11px; cursor: pointer;
      pointer-events: auto; transition: all 0.15s;
    }
    #hud-leave:hover { color: #fff; background: rgba(255,60,60,0.38); }

    .hud-dead-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .hud-dead-msg {
      font-size: 28px;
      font-weight: 700;
      color: #ff4a4a;
      text-shadow: 0 0 30px #ff4a4a;
    }

    /* ── Game Toasts ── */
    #game-toasts {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 200;
      pointer-events: none;
    }
    .game-toast {
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 6px;
      padding: 7px 18px;
      font: 600 13px/1 'Segoe UI', sans-serif;
      letter-spacing: 0.3px;
      opacity: 1;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }
    .game-toast-fade { opacity: 0; }

    /* ── GameOver ── */
    #gameover-screen canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .gameover-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .gameover-title {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .gameover-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }

    .stats-table {
      width: 500px;
      border-collapse: collapse;
      margin-bottom: 32px;
    }
    .stats-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      padding: 6px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .stats-table td {
      padding: 8px 12px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stats-table .alive   { color: #4aff88; }
    .stats-table .dead    { color: rgba(255,255,255,0.3); text-decoration: line-through; }

    .gameover-btns { display: flex; gap: 12px; justify-content: center; }
    .gameover-btns .btn { width: auto; padding: 12px 28px; margin-bottom: 0; }

    /* ── Mobile virtual controls ── */
    .mc-group {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      pointer-events: auto;
    }

    .mc-btn {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      border: none;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      transition: opacity 0.1s;
      pointer-events: auto;
    }
    .mc-btn:active { opacity: 0.6; }

    .mc-jump-btn {
      width: 52px;
      height: 52px;
      font-size: 18px;
      background: rgba(30, 80, 160, 0.7);
    }

    .mc-fire-btn {
      width: 70px;
      height: 70px;
      font-size: 15px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, rgba(200,60,20,0.85), rgba(255,100,40,0.85));
      box-shadow: 0 3px 12px rgba(255,80,20,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .mc-end-btn {
      width: 56px;
      height: 56px;
      font-size: 10px;
      letter-spacing: 0.5px;
      background: rgba(60, 60, 80, 0.7);
    }

    .mc-aim-btn {
      width: 44px;
      height: 44px;
      font-size: 18px;
      background: rgba(40, 120, 60, 0.65);
    }

    /* ── Main Menu ── */
    .mm-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mm-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 52px 56px 44px;
      background: rgba(5, 8, 18, 0.84);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 56px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,107,53,0.07);
      min-width: 380px;
    }

    .mm-logo-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .mm-logo {
      font-size: 84px;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #ff5c1a, #ffb870, #ff6b35, #ffd580);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: mmLogoPulse 4s ease-in-out infinite;
      line-height: 1;
      filter: drop-shadow(0 0 24px rgba(255,107,53,0.45));
    }

    .mm-logo-glow {
      position: absolute;
      inset: -16px -8px;
      background: radial-gradient(ellipse at center, rgba(255,107,53,0.14) 0%, transparent 68%);
      pointer-events: none;
      animation: mmGlowPulse 4s ease-in-out infinite;
    }

    @keyframes mmLogoPulse {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }
    @keyframes mmGlowPulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    .mm-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
      margin-top: 4px;
    }

    .mm-btns {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .mm-btn {
      width: 280px;
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-family: inherit;
    }
    .mm-btn:hover  { transform: translateY(-2px); }
    .mm-btn:active { transform: translateY(0); }

    .mm-btn-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .mm-btn-host {
      background: linear-gradient(135deg, #ff6b35, #e04e1f);
      color: #fff;
      box-shadow: 0 4px 22px rgba(255,107,53,0.38);
    }
    .mm-btn-host:hover { box-shadow: 0 7px 30px rgba(255,107,53,0.54); }

    .mm-btn-join {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .mm-btn-join:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .mm-btn-settings {
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .mm-btn-settings:hover { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.15); }

    .mm-footer {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.8px;
    }
    .mm-key {
      display: inline-block;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>
  <!-- Игровые canvas слои -->
  <canvas id="canvas-bg"></canvas>
  <canvas id="canvas-terrain"></canvas>
  <canvas id="canvas-game"></canvas>
  <canvas id="canvas-effects"></canvas>
  <canvas id="canvas-ui-game"></canvas>

  <!-- UI overlay -->
  <div id="ui"></div>

  <!-- Игровой HUD (скрыт до начала игры) -->
  <div id="hud" style="display:none"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
